name: Tests

on:
    push:
    pull_request:

env:
    php-extensions: iconv, json, mbstring, xml, gd, intl, tokenizer, mysqli
    php-tools: composer:v2

jobs:
    tests:
        name: PHP ${{ matrix.php }} tests

        runs-on: ubuntu-latest

        strategy:
            fail-fast: false

            matrix:
                php: ['8.3', '8.4']

        services:
            mysql:
                image: mysql:5.7

                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: test

                ports:
                    - 3306:3306

                options: >-
                    --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=10
                    --health-start-period=10s

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: ${{ env.php-extensions }}
                  tools: ${{ env.php-tools }}
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      composer-${{ runner.os }}-${{ matrix.php }}-

            - name: Install dependencies
              run: composer install --no-progress --prefer-dist

            - name: Import MySQL database
              run: |
                  mysql --host 127.0.0.1 \
                        --port 3306 \
                        -uroot \
                        -proot \
                        test < tests/db.sql

            - name: Run tests
              run: vendor/bin/tester -p php tests -s -C
